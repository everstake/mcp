  get_security_profile:
    <<: *static_readonly_tool
    description: |
      Comprehensive security and compliance information for Everstake: certifications, audits, infrastructure security, and compliance standards.
      Use when users need security details, compliance verification, or trust/safety information about Everstake's operations.
    static_response: |
      EVERSTAKE SECURITY PROFILE
      
      OVERVIEW: Everstake is the only major validator operator certified across all six institutional compliance standards simultaneously. Our globally distributed bare-metal infrastructure, multi-cloud architecture, and audited security frameworks deliver the uptime, transparency, and operational clarity required by institutional teams that cannot afford uncertainty.
      
      TRUST CENTER: https://security.everstake.one/
      REPORT VULNERABILITY: https://everstake.one/report-vulnerability
      AUDITOR: Prescient Security — Global Top 20 Independent Audit and Penetration Testing Company
      
      KEY DIFFERENTIATOR: Everstake is the only validator operator certified across all six major institutional compliance standards: SOC 2 Type II, ISO/IEC 27001, NIST CSF, ITGC, GDPR, and CCPA — simultaneously.
      
      CERTIFICATIONS & COMPLIANCE:
      
      1. SOC 2 TYPE II - CERTIFIED
      Validates that Everstake maintains high levels of operational integrity, data confidentiality, and system availability. Type II involves continuous evaluation of systems over time — one of the most rigorous benchmarks in enterprise-grade cybersecurity.
      Covers: Security, Availability, Processing Integrity, Confidentiality, and Privacy
      Issued by: AICPA (via Prescient Security audit)
      Significance: Required by most US enterprise and institutional buyers as prerequisite for security review
      
      2. ISO/IEC 27001:2022 - CERTIFIED
      International gold standard for information security management systems (ISMS). Confirms Everstake's ISMS complies with ISO/IEC 27001:2022, covering 93 prescribed Annex A security controls.
      Issued by: Prescient Security
      Significance: Global gold standard for ISMS — critical for non-US institutional and regulated entity buyers
      
      3. NIST CSF - COMPLIANT
      National Institute of Standards and Technology Cybersecurity Framework — widely adopted US federal and enterprise standard covering Identify, Protect, Detect, Respond, and Recover functions.
      Significance: Aligned with US government and critical infrastructure security expectations
      
      4. ITGC - COMPLIANT
      IT General Controls — standard controls covering access management, change management, computer operations, and IT infrastructure that underpin reliable financial and operational reporting.
      Significance: Required for integration with regulated financial institutions and audit trails
      
      5. GDPR - COMPLIANT
      General Data Protection Regulation — ensures Everstake adheres to the strictest data privacy protocols for users in the EU, EEA, and UK.
      Significance: Mandatory for any provider handling European client data
      
      6. CCPA/CRPA - COMPLIANT
      California Consumer Privacy Act / California Privacy Rights Act — US data privacy compliance for California residents.
      Significance: Required for providers operating with US-based clients and data subjects
      
      INFRASTRUCTURE SECURITY:
      - Architecture: Geo-distributed bare-metal infrastructure with multi-cloud architecture
      - Validator isolation: Isolated validator clusters per deployment
      - Failover: Automated failover with continuous performance monitoring
      - Monitoring: 24/7 continuous monitoring across all validators and networks
      - Slashing record: Zero material slashing events since inception (2018)
      - Uptime: 99.98% observed infrastructure uptime
      
      OPERATIONAL CONTROLS:
      - Strict operational controls and continuous system validation
      - Documented security controls aligned with ISO 27001 Annex A
      - Regular independent penetration testing
      - Smart contract audits (e.g. ETH2 Batch Deposit Contract audited by Ackee Blockchain Security)
      - Continuous control monitoring and improvement programme
      
      CUSTODY PLATFORM COMPATIBILITY:
      Non-custodial by design with seamless integration support for:
      - Fireblocks
      - BitGo
      - Anchorage Digital
      - Zodia Custody
      - Coinbase Custody
      - Copper.co
      - Safe
      
      CERTIFICATION REPORTS: Full certification reports available upon request — contact https://everstake.one/contact-us

